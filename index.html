<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Prompt',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#dff6ff,#b8e8fc,#7fd8ff,#4cb8ff);
background-size:400% 400%;
animation:bgMove 10s ease infinite;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
padding:20px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
}

nav a{
color:white;
text-decoration:none;
margin:0 20px;
font-size:18px;
font-weight:500;
transition:.3s;
}

nav a:hover{
color:#003366;
}

.container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{

width:430px;
padding:40px;
border-radius:30px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(25px);
box-shadow:0 20px 40px rgba(0,0,0,.15);
text-align:center;
color:white;

}

.card img{
width:170px;
height:170px;
border-radius:50%;
object-fit:cover;
border:5px solid white;
margin-bottom:20px;
}

.card h1{
font-size:36px;
}

.card h2{
font-size:20px;
font-weight:300;
margin-top:10px;
}

.card p{
margin:20px 0;
line-height:1.8;
}

button{
padding:14px 35px;
border:none;
border-radius:50px;
background:white;
color:#009dff;
font-size:18px;
cursor:pointer;
transition:.3s;
font-weight:bold;
}

button:hover{
transform:translateY(-5px);
background:#0ea5e9;
color:white;
}

.bubble{
position:absolute;
bottom:-100px;
background:rgba(255,255,255,.35);
border-radius:50%;
animation:float 15s linear infinite;
}

@keyframes float{

0%{
transform:translateY(0);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

</style>

</head>
<body>

</div>

<div class="bubble" style="left:45%;width:60px;height:60px;animation-duration:18s;"></div>

<div class="bubble" style="left:80%;width:50px;height:50px;animation-duration:20s;"></div>
